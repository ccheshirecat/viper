name: Viper CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.21'

jobs:
  # Quality Gates
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Code is not formatted. Please run 'gofmt -w .'"
          gofmt -l .
          exit 1
        fi

    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Run linter
      run: golangci-lint run --timeout=5m ./...

    - name: Install gosec
      run: go install github.com/securecodewarrior/gosec/v2/cmd/gosec@latest

    - name: Run security scanner
      run: gosec ./...

    - name: Check for potential issues
      run: |
        # Check for TODO comments (violates production-first philosophy)
        if grep -r "TODO" --include="*.go" .; then
          echo "Found TODO comments - violates Viper Engineering Doctrine"
          exit 1
        fi

        # Check for placeholder implementations
        if grep -r "panic.*not implemented" --include="*.go" .; then
          echo "Found not implemented panics - violates production-first philosophy"
          exit 1
        fi

  # Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run unit tests
      run: |
        mkdir -p coverage
        go test -v -race -coverprofile=coverage/coverage.out ./...
        go tool cover -html=coverage/coverage.out -o coverage/coverage.html

    - name: Check test coverage
      run: |
        coverage=$(go tool cover -func=coverage/coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Test coverage: ${coverage}%"

        # Require minimum coverage for critical packages
        if (( $(echo "$coverage < 80" | bc -l) )); then
          echo "Test coverage ${coverage}% is below minimum 80%"
          exit 1
        fi

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-reports
        path: coverage/

  # Build Tests
  build:
    name: Build Tests
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build binaries
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        go build -o bin/viper-${{ matrix.os }}-${{ matrix.arch }} ./cmd/viper
        go build -o bin/viper-agent-${{ matrix.os }}-${{ matrix.arch }} ./cmd/agent

    - name: Verify binaries
      if: matrix.os == 'linux' && matrix.arch == 'amd64'
      run: |
        file bin/viper-${{ matrix.os }}-${{ matrix.arch }}
        file bin/viper-agent-${{ matrix.os }}-${{ matrix.arch }}

    - name: Upload binaries
      uses: actions/upload-artifact@v3
      with:
        name: binaries-${{ matrix.os }}-${{ matrix.arch }}
        path: bin/viper*

  # Integration Tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [quality, test, build]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build CLI for integration tests
      run: make build-cli

    - name: Run integration tests
      run: go test -v -tags=integration ./tests/integration/...

    - name: Test CLI commands
      run: |
        ./bin/viper --version
        ./bin/viper --help
        ./bin/viper vms --help
        ./bin/viper tasks --help

  # E2E Tests (limited without real infrastructure)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build all binaries
      run: make build

    - name: Run E2E tests (structural)
      run: go test -v -tags=e2e ./tests/e2e/...

  # Security Analysis
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Performance Tests
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run benchmarks
      run: |
        go test -bench=. -benchmem ./... > benchmark.txt
        echo "Benchmark results:"
        cat benchmark.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: benchmark.txt

  # Release (on main branch)
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [quality, test, build, integration, e2e, security, performance]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build release artifacts
      run: make release

    - name: Generate release notes
      run: |
        echo "# Release $(date +%Y.%m.%d)" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "## Changes" >> RELEASE_NOTES.md
        git log --oneline --since="1 week ago" >> RELEASE_NOTES.md

    - name: Upload release artifacts
      uses: actions/upload-artifact@v3
      with:
        name: release-artifacts
        path: |
          dist/
          RELEASE_NOTES.md

# Workflow Status Badge Support
  status:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [quality, test, build, integration, e2e, security, performance]
    if: always()
    steps:
    - name: Check results
      run: |
        echo "Quality: ${{ needs.quality.result }}"
        echo "Tests: ${{ needs.test.result }}"
        echo "Build: ${{ needs.build.result }}"
        echo "Integration: ${{ needs.integration.result }}"
        echo "E2E: ${{ needs.e2e.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Performance: ${{ needs.performance.result }}"

        if [ "${{ needs.quality.result }}" != "success" ] ||
           [ "${{ needs.test.result }}" != "success" ] ||
           [ "${{ needs.build.result }}" != "success" ] ||
           [ "${{ needs.integration.result }}" != "success" ] ||
           [ "${{ needs.e2e.result }}" != "success" ] ||
           [ "${{ needs.security.result }}" != "success" ] ||
           [ "${{ needs.performance.result }}" != "success" ]; then
          echo "One or more jobs failed"
          exit 1
        fi

        echo "All checks passed!"