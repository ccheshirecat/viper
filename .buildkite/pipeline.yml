env:
  # Cloud Hypervisor configuration
  CH_BIN: "/usr/bin/cloud-hypervisor"
  CH_REMOTE_BIN: "/usr/bin/ch-remote"
  BRIDGE: "br0"

  # VM test images (these should be pre-built on agents)
  VM_IMAGE_PATH: "/root/viper-test-images"

  # Go build configuration
  CGO_ENABLED: 1
  GOOS: "linux"
  GOARCH: "amd64"

  # Buildkite registry configuration
  REGISTRY_ORG: "hypr"
  REGISTRY_NAME: "registry"

steps:
  - label: "🏗️ Build & Unit Tests"
    key: "build-test"
    agents:
      queue: "default"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$$PATH"

      echo "--- Go environment"
      go version
      go env

      echo "--- Dependencies and linting"
      go mod tidy
      go vet ./...

      echo "--- Unit tests"
      export CGO_ENABLED=1
      go test -count=1 -race ./internal/... ./pkg/...

      echo "--- Service Discovery Tests (REQUIRED)"
      echo "Testing new service discovery implementation..."
      go run examples/test-service-discovery.go || (echo "❌ CRITICAL: Service discovery test failed - this breaks the core functionality" && exit 1)

      echo "--- Integration Tests (short mode - REQUIRED)"
      go test -short ./tests/integration/ -run "^Test(AgentBinary|DockerImageCleanup|AgentHealth|TaskStructure|BuildIntegration)$$" || (echo "❌ CRITICAL: Integration tests failed - build artifacts missing" && exit 1)

      echo "--- Build binaries"
      make build

      echo "--- Verify binaries"
      ./bin/viper --help
      ./bin/viper-agent --help || echo "Agent help not available (expected in VM context)"

      echo "--- Upload binaries as artifacts"
      if [ -n "$${REGISTRY_KEY}" ]; then
        # Use semantic version from GitHub Actions if available, otherwise fallback to build number
        if [ -n "$${RELEASE_VERSION}" ]; then
          SEMVER="$${RELEASE_VERSION}"
          echo "Using GitHub Actions version: $${SEMVER}"
        else
          SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
          echo "Using fallback version: $${SEMVER}"
        fi

        # Rename files to include version before upload
        cp bin/viper viper-$${SEMVER}.bin
        cp bin/viper-agent viper-agent-$${SEMVER}.bin

        curl -X POST https://api.buildkite.com/v2/packages/organizations/$$REGISTRY_ORG/registries/$$REGISTRY_NAME/packages \
             -H "Authorization: Bearer $$REGISTRY_KEY" \
             -F "file=@viper-$${SEMVER}.bin"

        curl -X POST https://api.buildkite.com/v2/packages/organizations/$$REGISTRY_ORG/registries/$$REGISTRY_NAME/packages \
             -H "Authorization: Bearer $$REGISTRY_KEY" \
             -F "file=@viper-agent-$${SEMVER}.bin"
        echo "✅ Binaries uploaded to registry"
      else
        echo "⚠️ REGISTRY_KEY not set - skipping artifact upload"
      fi

  - label: "🐳 Docker Image Build"
    key: "docker-build"
    agents:
      queue: "docker"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$$PATH"

      echo "--- Docker environment"
      docker --version
      docker info

      echo "--- Download agent binary from registry (if available)"
      mkdir -p bin
      if [ -n "$${REGISTRY_KEY}" ]; then
        # Use semantic version from GitHub Actions if available, otherwise fallback to build number
        if [ -n "$${RELEASE_VERSION}" ]; then
          SEMVER="$${RELEASE_VERSION}"
          echo "Using GitHub Actions version: $${SEMVER}"
        else
          SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
          echo "Using fallback version: $${SEMVER}"
        fi
        curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
          https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-agent || echo "Failed to download from registry"
        if [ -f "viper-agent" ]; then
          mv viper-agent bin/viper-agent
          chmod +x bin/viper-agent
          echo "✅ Agent binary downloaded from registry"
        fi
      fi

      # Fallback: build agent binary if not downloaded
      if [ ! -f "bin/viper-agent" ]; then
        echo "Building agent binary locally..."
        go build -trimpath -ldflags "-w -s" -o bin/viper-agent ./cmd/agent
        chmod +x bin/viper-agent
      fi

      echo "--- Verify required tools for image building"
      which docker
      docker --version

      echo "--- Build VM image using Docker pipeline"
      make build-images

      echo "--- Verify VM image artifacts"
      ls -la dist/

      echo "--- Upload VM artifacts to registry"
      # Use semantic version from GitHub Actions if available, otherwise fallback to build number
      if [ -n "$${RELEASE_VERSION}" ]; then
        SEMVER="$${RELEASE_VERSION}"
        echo "Using GitHub Actions version: $${SEMVER}"
      else
        SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
        echo "Using fallback version: $${SEMVER}"
      fi

      if [ -f "dist/vmlinuz" ]; then
        # Rename files to include version before upload
        cp dist/vmlinuz vmlinuz-$${SEMVER}.bin
        curl -X POST https://api.buildkite.com/v2/packages/organizations/$$REGISTRY_ORG/registries/$$REGISTRY_NAME/packages \
             -H "Authorization: Bearer $$REGISTRY_KEY" \
             -F "file=@vmlinuz-$${SEMVER}.bin"
      fi

      if [ -f "dist/viper-initramfs.gz" ]; then
        cp dist/viper-initramfs.gz viper-initramfs-$${SEMVER}.gz
        curl -X POST https://api.buildkite.com/v2/packages/organizations/$$REGISTRY_ORG/registries/$$REGISTRY_NAME/packages \
             -H "Authorization: Bearer $$REGISTRY_KEY" \
             -F "file=@viper-initramfs-$${SEMVER}.gz"
      fi

      if [ -f "dist/viper-headless.qcow2" ]; then
        echo "✅ VM image created successfully"
        qemu-img info dist/viper-headless.qcow2 || docker run --rm -v $$(pwd):/work -w /work qemu/qemu:latest qemu-img info dist/viper-headless.qcow2

        cp dist/viper-headless.qcow2 viper-headless-$${SEMVER}.qcow2
        curl -X POST https://api.buildkite.com/v2/packages/organizations/$$REGISTRY_ORG/registries/$$REGISTRY_NAME/packages \
             -H "Authorization: Bearer $$REGISTRY_KEY" \
             -F "file=@viper-headless-$${SEMVER}.qcow2"
      else
        echo "❌ VM image build failed"
        exit 1
      fi

  - label: "🔬 Cloud Hypervisor Integration Test"
    key: "integration-test"
    depends_on:
      - "build-test"
      - "docker-build"
    agents:
      queue: "default"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$$PATH"

      echo "--- Download VM artifacts from registry"
      mkdir -p dist
      # Use semantic version from GitHub Actions if available, otherwise fallback to build number
      if [ -n "$${RELEASE_VERSION}" ]; then
        SEMVER="$${RELEASE_VERSION}"
        echo "Using GitHub Actions version: $${SEMVER}"
      else
        SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
        echo "Using fallback version: $${SEMVER}"
      fi

      echo "--- Download kernel"
      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/vmlinuz-$${SEMVER}.bin || echo "Failed to download kernel"
      if [ -f "vmlinuz-$${SEMVER}.bin" ]; then
        mv vmlinuz-$${SEMVER}.bin dist/vmlinuz
      fi

      echo "--- Download initramfs"
      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-initramfs-$${SEMVER}.gz || echo "Failed to download initramfs"
      if [ -f "viper-initramfs-$${SEMVER}.gz" ]; then
        mv viper-initramfs-$${SEMVER}.gz dist/viper-initramfs.gz
      fi

      echo "--- Download qcow2 image (optional)"
      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-headless-$${SEMVER}.qcow2 || true
      if [ -f "viper-headless-$${SEMVER}.qcow2" ]; then
        mv viper-headless-$${SEMVER}.qcow2 dist/viper-headless.qcow2
      fi

      echo "--- Verify Cloud Hypervisor setup"
      cloud-hypervisor --version || echo "Cloud Hypervisor not available"
      ch-remote --version || echo "ch-remote not available"

      echo "--- Check network bridge"
      ip link show $${BRIDGE} || (echo "Bridge $${BRIDGE} not found - creating test bridge" && sudo ip link add $${BRIDGE} type bridge && sudo ip link set $${BRIDGE} up)

      echo "--- Verify VM image artifacts exist"
      ls -la dist/
      if [ -f "dist/vmlinuz" ]; then
        echo "✅ Kernel found: $$(ls -la dist/vmlinuz)"
      else
        echo "❌ Kernel not found"
        exit 1
      fi

      if [ -f "dist/viper-initramfs.gz" ]; then
        echo "✅ Initramfs found: $$(ls -la dist/viper-initramfs.gz)"
      else
        echo "❌ Initramfs not found"
        exit 1
      fi

      echo "--- Test kernel boot parameters validation"
      file dist/vmlinuz || echo "file command not available"
      file dist/viper-initramfs.gz || echo "file command not available"

      echo "--- Test VM boot with Cloud Hypervisor (dry run)"
      if [ -f "dist/viper-headless.qcow2" ]; then
        qemu-img check dist/viper-headless.qcow2 || echo "qemu-img not available"
        qemu-img info dist/viper-headless.qcow2 || echo "qemu-img info not available"
      fi

      echo "--- Generate example Nomad job template"
      cat > dist/example-job.hcl << EOF
      job "viper-example" {
        datacenters = ["dc1"]
        type        = "service"

        group "browser" {
          count = 1

          task "viper-vm" {
            driver = "ch"

            config {
              kernel = "$$(pwd)/dist/vmlinuz"
              initramfs = "$$(pwd)/dist/viper-initramfs.gz"
              disk = "$$(pwd)/dist/viper-headless.qcow2"
              hostname = "viper-example"
              cmdline = "console=ttyS0 init=/usr/local/bin/viper-agent"

              network_interface {
                bridge {
                  name = "$${BRIDGE}"
                }
              }
            }

            resources {
              cpu    = 1000
              memory = 1024
            }

            service {
              name = "viper-agent"
              port = "agent"

              check {
                type = "tcp"
                port = "agent"
                interval = "30s"
                timeout = "5s"
              }
            }
          }

          network {
            port "agent" {
              to = 8080
            }
          }
        }
      }
      EOF

      echo "--- Validate generated Nomad job template"
      if [ -f "dist/example-job.hcl" ]; then
        echo "✅ Nomad job template generated"
        cat dist/example-job.hcl
      else
        echo "❌ No Nomad job template found"
        exit 1
      fi

      echo "--- Run VM Integration Tests (requires artifacts)"
      go test -v ./tests/integration/ -run "^Test(VMImageExists|NomadJobTemplate)$$" || (echo "❌ CRITICAL: VM integration tests failed" && exit 1)


  - label: "🔍 Service Discovery & Agent Tests"
    key: "service-discovery-test"
    depends_on: "integration-test"
    agents:
      queue: "default"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$$PATH"

      echo "--- Download Viper CLI from registry for testing"
      mkdir -p bin
      # Use semantic version from GitHub Actions if available, otherwise fallback to build number
      if [ -n "$${RELEASE_VERSION}" ]; then
        SEMVER="$${RELEASE_VERSION}"
        echo "Using GitHub Actions version: $${SEMVER}"
      else
        SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
        echo "Using fallback version: $${SEMVER}"
      fi
      if curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-$${SEMVER}.bin; then
        mv viper-$${SEMVER}.bin bin/viper
        chmod +x bin/viper
        echo "✅ Viper CLI downloaded successfully"
      else
        echo "Building locally..."
        go build -trimpath -ldflags "-w -s" -o bin/viper ./cmd/viper
        chmod +x bin/viper
      fi

      echo "--- Install Nomad for service discovery testing"
      if ! command -v nomad >/dev/null 2>&1; then
        echo "Installing Nomad..."
        wget -O /tmp/nomad.zip https://releases.hashicorp.com/nomad/1.6.2/nomad_1.6.2_linux_amd64.zip
        cd /tmp && unzip nomad.zip && sudo mv nomad /usr/local/bin/
        nomad --version
      fi

      echo "--- Start Nomad in dev mode for testing"
      nomad agent -dev -bind 0.0.0.0 -log-level INFO > nomad.log 2>&1 &
      NOMAD_PID=$!
      echo "Nomad PID: $$NOMAD_PID"

      # Wait for Nomad to start
      echo "Waiting for Nomad to start..."
      sleep 10

      # Verify Nomad is running
      nomad node status || (echo "Nomad failed to start" && cat nomad.log && exit 1)

      echo "--- Test Service Discovery Implementation (CRITICAL)"
      echo "Running comprehensive service discovery test..."
      go run examples/test-service-discovery.go || (echo "❌ CRITICAL: Service discovery implementation failed" && kill $$NOMAD_PID && exit 1)

      echo "--- Test AgentClient Service Discovery (CRITICAL)"
      echo "Testing AgentClient with service discovery..."
      go test -v ./pkg/client/... -run TestAgentClient || (echo "❌ CRITICAL: AgentClient service discovery failed" && kill $$NOMAD_PID && exit 1)

      echo "--- Test Nomad Integration (CRITICAL)"
      echo "Testing Nomad client integration..."
      go test -v ./internal/nomad/... -run TestListVMs || (echo "❌ CRITICAL: Nomad integration failed" && kill $$NOMAD_PID && exit 1)

      echo "--- Validate Service Discovery Core Functionality"
      echo "Testing ResolveVMAgentURL method specifically..."
      go test -v ./internal/nomad/... -run TestResolve || echo "⚠️ ResolveVMAgentURL test not found - this is expected if no test VM exists"

      echo "--- Cleanup"
      kill $$NOMAD_PID || echo "Nomad already stopped"

      echo "✅ Service discovery tests completed successfully"

  - label: "🚀 End-to-End Viper CLI Test"
    key: "e2e-test"
    depends_on: "service-discovery-test"
    agents:
      queue: "default"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$$PATH"

      echo "--- Download Viper CLI from registry"
      mkdir -p bin
      # Use semantic version from GitHub Actions if available, otherwise fallback to build number
      if [ -n "$${RELEASE_VERSION}" ]; then
        SEMVER="$${RELEASE_VERSION}"
        echo "Using GitHub Actions version: $${SEMVER}"
      else
        SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
        echo "Using fallback version: $${SEMVER}"
      fi
      echo "Downloading viper from registry..."
      if curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-$${SEMVER}.bin; then
        if [ -f "viper-$${SEMVER}.bin" ]; then
          mv viper-$${SEMVER}.bin bin/viper
          chmod +x bin/viper
          echo "✅ Viper CLI downloaded successfully"
        else
          echo "❌ Download succeeded but file not found: viper-$${SEMVER}.bin"
          ls -la
          exit 1
        fi
      else
        echo "❌ Failed to download Viper CLI from registry"
        echo "Falling back to building locally..."
        go build -trimpath -ldflags "-w -s" -o bin/viper ./cmd/viper
        chmod +x bin/viper
        echo "✅ Viper CLI built locally"
      fi

      echo "--- Install Nomad (if not present)"
      if ! command -v nomad >/dev/null 2>&1; then
        echo "Installing Nomad..."
        wget -O /tmp/nomad.zip https://releases.hashicorp.com/nomad/1.6.2/nomad_1.6.2_linux_amd64.zip
        cd /tmp && unzip nomad.zip && sudo mv nomad /usr/local/bin/
        nomad --version
      fi

      echo "--- Debug: Check workspace contents"
      pwd
      ls -la
      ls -la bin/ || echo "bin/ directory not found"

      echo "--- Test Viper CLI basic commands"
      ./bin/viper --version
      ./bin/viper vms --help
      ./bin/viper tasks --help
      ./bin/viper browsers --help
      ./bin/viper profiles --help

      echo "--- Download VM artifacts for CLI test"
      mkdir -p dist
      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-headless-$${SEMVER}.qcow2 || true
      if [ -f "viper-headless-$${SEMVER}.qcow2" ]; then
        mv viper-headless-$${SEMVER}.qcow2 dist/viper-headless.qcow2
        echo "--- Validate CLI can parse VM image"
        ls -la dist/viper-headless.qcow2
        echo "VM image size: $$(du -h dist/viper-headless.qcow2 | cut -f1)"
      fi

      echo "--- Test job template validation (if Nomad available)"
      if command -v nomad >/dev/null 2>&1 && [ -f "dist/example-job.hcl" ]; then
        echo "Validating Nomad job template..."
        nomad job validate dist/example-job.hcl || echo "⚠️ Job validation failed - may need driver setup"
      fi

      echo "--- Test CLI VM IP resolution (using Viper CLI with Nomad)"
      if command -v nomad >/dev/null 2>&1 && nomad node status >/dev/null 2>&1; then
        echo "Testing CLI with real Nomad integration..."

        # Try to create a VM using the CLI
        ./bin/viper vms create cli-test-vm --memory 1024 --cpu 1000 --bridge $${BRIDGE} || echo "⚠️ CLI VM creation failed"

        # Wait a moment
        sleep 15

        # Try to list VMs
        ./bin/viper vms list || echo "⚠️ CLI VM listing failed"

        # Test browser spawn (this will fail until IP resolution is implemented)
        ./bin/viper browsers spawn cli-test-vm test-ctx || echo "⚠️ CLI browser spawn failed (expected - IP resolution not implemented)"

        # Cleanup
        ./bin/viper vms destroy cli-test-vm --force || echo "⚠️ CLI VM cleanup failed"
      else
        echo "⚠️ No Nomad cluster - skipping CLI integration test"
      fi

      echo "--- Integration test summary"
      echo "✅ Viper CLI built and functional"
      echo "✅ VM image created from Docker pipeline"
      echo "✅ Nomad job template generated"
      echo "✅ CLI VM management commands tested"
      echo "⚠️ Browser automation requires IP resolution fix"
      echo "✅ Ready for deployment with Cloud Hypervisor Nomad driver"

  - label: "🔥 Real microVM End-to-End Test (REQUIRED)"
    key: "real-microvm-test"
    depends_on: "e2e-test"
    agents:
      queue: "default" # Use default queue - agents MUST have nomad-driver-ch for development
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$$PATH"

      echo "--- Verify nomad-driver-ch availability (REQUIRED for development)"
      if ! ls /opt/nomad/plugins/nomad-driver-ch* >/dev/null 2>&1; then
        echo "❌ CRITICAL: nomad-driver-ch plugin not found in /opt/nomad/plugins/"
        echo "❌ This is a REQUIRED component for Viper development and release validation"
        echo "❌ Please install nomad-driver-ch on the Buildkite agent:"
        echo "   1. Download: wget https://github.com/ccheshirecat/nomad-driver-ch/releases/download/v0.2.3/nomad-driver-ch-v0.2.3-linux-amd64.tar.gz"
        echo "   2. Extract: tar -xf nomad-driver-ch-v0.2.3-linux-amd64.tar.gz"
        echo "   3. Install: sudo mv nomad-driver-ch-linux-amd64 /opt/nomad/plugins/nomad-driver-ch"
        echo "   4. Configure Nomad client with the driver"
        echo "❌ BUILD FAILED: Cannot validate production readiness without nomad-driver-ch"
        exit 1
      fi

      echo "✅ nomad-driver-ch plugin found - proceeding with real microVM testing"

      echo "--- Download all artifacts for microVM testing"
      mkdir -p bin dist
      # Use semantic version from GitHub Actions if available, otherwise fallback to build number
      if [ -n "$${RELEASE_VERSION}" ]; then
        SEMVER="$${RELEASE_VERSION}"
        echo "Using GitHub Actions version: $${SEMVER}"
      else
        SEMVER="0.1.$${BUILDKITE_BUILD_NUMBER}"
        echo "Using fallback version: $${SEMVER}"
      fi

      # Download binaries
      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-$${SEMVER}.bin
      mv viper-$${SEMVER}.bin bin/viper
      chmod +x bin/viper

      # Download VM artifacts
      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/vmlinuz-$${SEMVER}.bin
      mv vmlinuz-$${SEMVER}.bin dist/vmlinuz

      curl -O -L -H "Authorization: Bearer $$REGISTRY_KEY" \
        https://packages.buildkite.com/$$REGISTRY_ORG/$$REGISTRY_NAME/files/viper-initramfs-$${SEMVER}.gz
      mv viper-initramfs-$${SEMVER}.gz dist/viper-initramfs.gz

      echo "--- Verify Cloud Hypervisor and bridge setup"
      cloud-hypervisor --version
      ch-remote --version
      ip link show $${BRIDGE} || (echo "Creating test bridge" && sudo ip link add $${BRIDGE} type bridge && sudo ip link set $${BRIDGE} up)

      echo "--- Start Nomad with nomad-driver-ch"
      # Set bridge name for job template
      export BRIDGE=br0
      # Assume Nomad is already configured with the driver on this agent
      nomad node status

      echo "--- Run real microVM end-to-end test (FINAL VALIDATION)"
      echo "Testing complete workflow with actual nomad-driver-ch..."
      echo "This test validates:"
      echo "  1. VM creation with nomad-driver-ch"
      echo "  2. Service discovery IP resolution"
      echo "  3. Agent communication and health checks"
      echo "  4. Browser context spawning"
      echo "  5. Task submission and execution"
      echo "  6. Complete end-to-end workflow"

      export SKIP_CH_TESTS=false  # Enable the real microVM tests
      go test -v -timeout 10m ./tests/integration/microvm_e2e_test.go -run TestMicroVMEndToEnd

      if [ $? -eq 0 ]; then
        echo "🎉 FINAL VALIDATION SUCCESSFUL!"
        echo "✅ Viper is PRODUCTION-READY with nomad-driver-ch"
        echo "✅ Service discovery working with real microVMs"
        echo "✅ Agent communication functional"
        echo "✅ Browser automation operational"
        echo "✅ Complete end-to-end workflow validated"
        echo ""
        echo "🚀 RELEASE READY: All critical tests passed"
      else
        echo "❌ CRITICAL: Final microVM validation FAILED"
        echo "❌ Viper is NOT ready for release"
        echo "❌ Fix the failing tests before deploying to production"
        exit 1
      fi

# Retry configuration for flaky network/build issues
retry:
  automatic:
    - exit_status: 1
      limit: 2
    - exit_status: 2
      limit: 1